services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_resume}
      POSTGRES_USER: ${POSTGRES_USER:-ai_agent_resume}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-ai_agent_resume}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_agent_resume}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/credentials:/app/backend/credentials:ro

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: celery -A celery_app.celery_app worker --loglevel=info --concurrency=1
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-ai_agent_resume}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_agent_resume}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - backend
      - postgres
      - redis
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/credentials:/app/backend/credentials:ro

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      INTERNAL_BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres_data:
  redis_data:
